<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Twin Console</title>
  <style>
    body{font-family:Inter,system-ui;background:#0b1020;color:#e5e7eb;margin:0;padding:16px}
    .cards{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px;margin-bottom:12px}
    .card{background:#141b34;border:1px solid #273252;border-radius:12px;padding:12px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .panel{background:#141b34;border:1px solid #273252;border-radius:12px;padding:12px}
    canvas{width:100%;height:260px;display:block}
    #three{height:260px;border-radius:8px;overflow:hidden}
    table{width:100%;border-collapse:collapse;background:#141b34;border-radius:12px;overflow:hidden}
    th,td{padding:10px;border-bottom:1px solid #243055;text-align:left;font-size:13px}
    .critical{color:#ff6b6b}.warning{color:#ffd166}.normal{color:#72f1b8}
    .ops{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0 12px}
    button{background:#2b66f6;color:#fff;border:0;border-radius:8px;padding:6px 10px;cursor:pointer}
    button.secondary{background:#2a334f}
  </style>
</head>
<body>
  <h2>工厂数字孪生大屏（SpacetimeDB-ready）</h2>
  <div id="tip" style="margin:8px 0 12px;font-size:12px;opacity:.85"></div>
  <div class="ops">
    <button id="soundBtn">开启告警声音</button>
    <button class="secondary" id="muteBtn">静音</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="row">
    <div class="panel">
      <h4 style="margin:0 0 8px">历史趋势图（最近60秒）</h4>
      <canvas id="trend" width="900" height="260"></canvas>
    </div>
    <div class="panel">
      <h4 style="margin:0 0 8px">3D车间视图</h4>
      <div id="three"></div>
    </div>
  </div>

  <table>
    <thead><tr><th>设备</th><th>产线</th><th>温度</th><th>振动</th><th>功耗(kW)</th><th>健康分</th><th>告警</th><th>更新时间</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
const state = new Map();
const cards = document.getElementById('cards');
const tbody = document.getElementById('tbody');
const tip = document.getElementById('tip');

const q = new URLSearchParams(location.search);
const DEFAULT_API = 'https://digital-twin-gateway.onrender.com';
const DEFAULT_WS = 'wss://digital-twin-gateway.onrender.com';
const API_BASE = q.get('api') || localStorage.getItem('twin_api_base') || DEFAULT_API;
const WS_BASE = q.get('ws') || localStorage.getItem('twin_ws_base') || DEFAULT_WS;
localStorage.setItem('twin_api_base', API_BASE);
localStorage.setItem('twin_ws_base', WS_BASE);
tip.textContent = `API: ${API_BASE} | WS: ${WS_BASE}/ws`;

let audioCtx = null;
let soundEnabled = false;
let prevCritical = 0;
document.getElementById('soundBtn').onclick = () => {
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  soundEnabled = true;
};
document.getElementById('muteBtn').onclick = () => { soundEnabled = false; };
function beep(freq = 880, ms = 180) {
  if (!soundEnabled || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square'; o.frequency.value = freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.03, audioCtx.currentTime);
  o.start();
  setTimeout(()=>o.stop(), ms);
}

const trendData = [];
const trendCanvas = document.getElementById('trend');
const trendCtx = trendCanvas.getContext('2d');
function pushTrend() {
  const arr = [...state.values()];
  const avgTemp = arr.length ? arr.reduce((a,b)=>a+b.temperature,0)/arr.length : 0;
  const avgVib = arr.length ? arr.reduce((a,b)=>a+b.vibration,0)/arr.length : 0;
  trendData.push({ t: Date.now(), temp: avgTemp, vib: avgVib });
  if (trendData.length > 60) trendData.shift();
}
function drawTrend() {
  const w = trendCanvas.width, h = trendCanvas.height;
  trendCtx.clearRect(0,0,w,h);
  trendCtx.fillStyle = '#0f1730'; trendCtx.fillRect(0,0,w,h);
  trendCtx.strokeStyle = '#223258'; trendCtx.lineWidth = 1;
  for (let i=0;i<6;i++) {
    const y = (h/6)*i;
    trendCtx.beginPath(); trendCtx.moveTo(0,y); trendCtx.lineTo(w,y); trendCtx.stroke();
  }
  if (trendData.length < 2) return;
  const maxY = Math.max(100, ...trendData.map(d=>Math.max(d.temp, d.vib*2)));
  const toX = (i)=> (i/(trendData.length-1))*(w-40)+20;
  const toY = (v)=> h - (v/maxY)*(h-30)-15;

  trendCtx.strokeStyle = '#ff6b6b'; trendCtx.lineWidth = 2; trendCtx.beginPath();
  trendData.forEach((d,i)=> i?trendCtx.lineTo(toX(i),toY(d.temp)):trendCtx.moveTo(toX(i),toY(d.temp))); trendCtx.stroke();
  trendCtx.strokeStyle = '#5bc0ff'; trendCtx.beginPath();
  trendData.forEach((d,i)=> i?trendCtx.lineTo(toX(i),toY(d.vib*2)):trendCtx.moveTo(toX(i),toY(d.vib*2))); trendCtx.stroke();
  trendCtx.fillStyle = '#9db2df'; trendCtx.font = '12px sans-serif';
  trendCtx.fillText('红: 平均温度', 20, 18);
  trendCtx.fillText('蓝: 平均振动 x2', 140, 18);
}

// ----- 3D Workshop -----
const threeRoot = document.getElementById('three');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1730);
const camera = new THREE.PerspectiveCamera(50, threeRoot.clientWidth/260, 0.1, 1000);
camera.position.set(0, 8, 14);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(threeRoot.clientWidth, 260);
threeRoot.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(6,10,6); scene.add(dl);

const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 12), new THREE.MeshStandardMaterial({ color: 0x1b2645 }));
floor.rotation.x = -Math.PI/2; scene.add(floor);

const boxes = new Map();
function alarmColor(level){ return level==='critical' ? 0xff4d4f : level==='warning' ? 0xffd166 : 0x3ddc97; }
function sync3D() {
  const arr = [...state.values()];
  arr.forEach((d, idx) => {
    let mesh = boxes.get(d.deviceId);
    if (!mesh) {
      mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 1.2, 1.2),
        new THREE.MeshStandardMaterial({ color: alarmColor(d.alarmLevel) })
      );
      const col = idx % 4, row = Math.floor(idx/4);
      mesh.position.set(-6 + col*4, 0.8, -3 + row*4);
      scene.add(mesh);
      boxes.set(d.deviceId, mesh);
    }
    mesh.material.color.setHex(alarmColor(d.alarmLevel));
    mesh.scale.y = 0.8 + Math.max(0, (d.temperature-50)/60);
    mesh.position.y = mesh.scale.y / 2;
  });
}
(function animate(){
  requestAnimationFrame(animate);
  boxes.forEach((m)=>{ m.rotation.y += 0.01; });
  renderer.render(scene,camera);
})();

function renderSummary() {
  const arr = [...state.values()];
  const critical = arr.filter(d=>d.alarmLevel==='critical').length;
  const warning = arr.filter(d=>d.alarmLevel==='warning').length;
  const avgHealth = arr.length?Math.round(arr.reduce((a,b)=>a+b.healthScore,0)/arr.length):0;
  cards.innerHTML = [
    ['设备总数', arr.length],
    ['严重告警', critical],
    ['预警数', warning],
    ['平均健康分', avgHealth]
  ].map(([k,v])=>`<div class='card'><div>${k}</div><h2>${v}</h2></div>`).join('');

  if (critical > prevCritical) {
    beep(980, 220); setTimeout(()=>beep(760,180), 250);
  }
  prevCritical = critical;
}

function renderTable() {
  tbody.innerHTML = [...state.values()].sort((a,b)=>b.updatedAt-a.updatedAt).map(d=>`<tr>
    <td>${d.deviceId}</td><td>${d.line}</td><td>${d.temperature.toFixed(1)}℃</td><td>${d.vibration.toFixed(1)}</td>
    <td>${d.powerKw.toFixed(1)}</td><td>${d.healthScore}</td><td class='${d.alarmLevel}'>${d.alarmLevel}</td>
    <td>${new Date(d.updatedAt).toLocaleTimeString()}</td></tr>`).join('');
}

function refreshViews() {
  renderSummary();
  renderTable();
  pushTrend();
  drawTrend();
  sync3D();
}

fetch(`${API_BASE}/snapshot`).then(r=>r.json()).then(data=>{
  (data.devices||[]).forEach(d=>state.set(d.deviceId,d));
  refreshViews();
});

const ws = new WebSocket(`${WS_BASE}/ws`);
ws.onmessage = (ev)=>{
  const msg = JSON.parse(ev.data);
  if (msg.type==='device_update') {
    state.set(msg.payload.deviceId, msg.payload);
    refreshViews();
  }
};
setInterval(()=>{ pushTrend(); drawTrend(); }, 1000);
</script>
</body></html>
